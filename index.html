<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thao tác Hệ thống</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>
</head>
<body class="bg-gray-100 h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
        
        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
            <i class="fa-solid fa-sliders"></i>
        </div>
        <h2 class="text-xl font-bold text-gray-800 mb-6">Bảng Thao Tác</h2>
        
        <div id="ui-notification" class="hidden mb-6 p-3 rounded-lg text-sm font-medium transition-all"></div>

        <div class="flex flex-col gap-3">
            
            <button onclick="executeAction('update', this)" class="group w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 shadow-sm">
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <span>Cập nhật Gốc & Làm mới RAM</span>
            </button>

            <button onclick="executeAction('refresh', this)" class="w-full bg-gray-50 hover:bg-gray-100 text-gray-700 font-medium py-3.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 border border-gray-200">
                <i class="fa-solid fa-memory"></i>
                <span>Chỉ làm mới bộ nhớ (RAM)</span>
            </button>

            <hr class="my-2 border-gray-100">

            <button onclick="executeExit()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-medium py-3.5 px-4 rounded-xl transition-all flex items-center justify-center gap-2 border border-red-100">
                <i class="fa-solid fa-power-off"></i>
                <span>Thoát hệ thống</span>
            </button>
            
        </div>
    </div>

    <script>
        // Xử lý click action - Tích hợp Loading trực tiếp trên nút
        function executeAction(actionType, btnElement) {
            const icon = btnElement.querySelector('i');
            const textSpan = btnElement.querySelector('span');
            const originalIconClass = icon.className;
            const originalText = textSpan.innerText;
            
            // Chuyển sang trạng thái Loading xoay tròn
            icon.className = 'fa-solid fa-circle-notch fa-spin';
            textSpan.innerText = 'Đang xử lý...';
            btnElement.classList.add('opacity-75', 'cursor-wait');
            btnElement.disabled = true;

            // Ẩn thông báo cũ
            hideNotification();

            // CHÚ Ý: Đặt code `fetch()` gọi tới Apps Script của bạn tại đây
            // Dưới đây là hàm setTimeout giả lập thời gian server chạy (chạy ngầm)
            setTimeout(() => {
                
                // Sau khi Apps Script chạy xong, trả lại giao diện nút ban đầu
                icon.className = originalIconClass;
                textSpan.innerText = originalText;
                btnElement.classList.remove('opacity-75', 'cursor-wait');
                btnElement.disabled = false;
                
                // Hiển thị thông báo thành công ngay trên giao diện
                showNotification('Thao tác hoàn tất thành công!', 'success');
                
            }, 2500); // Đổi 2500 thành logic await fetch() của bạn
        }

        // Xử lý nút Thoát (Tránh alert của trình duyệt)
        function executeExit() {
            showNotification('Đã đăng xuất và đóng phiên làm việc an toàn.', 'info');
            
            // Xử lý logic thoát của bạn ở đây (ví dụ: xóa token, redirect...)
            window.location.href = 'https://script.google.com/a/macros/ehou.edu.vn/s/AKfycbyPDmxzdVHGIufwMuU_g3UpmbZKhQ_wjCeUYrEqBlzcbc4dwu5DOhdW1vddWBvPE0xBSQ/exec';
        }

        // Hàm hỗ trợ hiển thị UI Alert
        function showNotification(message, type) {
            const notif = document.getElementById('ui-notification');
            notif.className = 'mb-6 p-3 rounded-lg text-sm font-medium transition-all block'; // Reset class
            
            if(type === 'success') {
                notif.classList.add('bg-green-50', 'text-green-700', 'border', 'border-green-200');
            } else if (type === 'info') {
                notif.classList.add('bg-blue-50', 'text-blue-700', 'border', 'border-blue-200');
            }
            
            notif.innerText = message;
        }

        function hideNotification() {
            const notif = document.getElementById('ui-notification');
            notif.style.display = 'none';
        }
    </script>
</body>
</html>
