<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản trị</title>
    <style>
        /* CSS reset để iframe chiếm trọn 100% màn hình, không có thanh cuộn thừa */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #f3f4f6; /* Màu nền chờ trong lúc tải */
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://script.google.com/a/macros/ehou.edu.vn/s/AKfycbwm2DpOWcP9X2WU5VgOaG6Nfnz3AlyHUx3_ozrjU8-Vyh-ZKA48OXCrhd_ApUPZd6N0Gw/exec" allowfullscreen></iframe>

</body>
</html>
